<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Usuario</title>
</head>
<h2>Formulario</h2>
<body>
    <form action="#" method="get">
        <fieldset>
            <label for="id_user">User:</label>
            <input type="text" id="id_user" name="user" required maxlength="20">
            <br>
            <label for="id_password">Password:</label>
            <input type="password" name="password" id="id_password" required minlength="6" maxlength="25">
            <input type="submit" name="Enviar">
        </fieldset>
    </form>
</body>
</html>
